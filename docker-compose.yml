version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: craftlens_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - craftlens_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: craftlens_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/craftlens-ai
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    networks:
      - craftlens_network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: craftlens_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000/api
      - VITE_API_TIMEOUT=30000
    networks:
      - craftlens_network

volumes:
  mongodb_data:

networks:
  craftlens_network:
    driver: bridge
